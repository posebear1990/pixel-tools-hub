<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Xiaoxiong Apps</title>
    <link rel="icon" type="image/svg+xml" href="./assets/icons/favicon.svg" />
    <link rel="shortcut icon" href="./assets/icons/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Silkscreen:wght@400;700&family=VT323&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css?v=20260228a" />
  </head>
  <body>
    <main class="scene">
      <div class="cloud-layer cloud-layer-back" aria-hidden="true"></div>
      <div class="cloud-layer cloud-layer-front" aria-hidden="true"></div>

      <section class="phone" id="phone" aria-label="Pixel phone navigation">
        <header class="status-bar">
          <span id="clock">--:--</span>
          <span>XIAOXIONG APPS</span>
        </header>

        <section class="hero">
          <h1>Xiaoxiong Apps</h1>
          <p id="mode-hint">Hold an app to enter edit mode</p>
        </section>

        <section class="apps" id="apps" aria-label="App grid"></section>

        <footer class="dock">
          <button class="dock-btn dock-btn-secondary" id="reset-layout" type="button">RESET</button>
          <button class="dock-btn" id="toggle-edit" type="button">EDIT</button>
        </footer>
      </section>
    </main>

    <script src="./apps.config.js" defer></script>
    <script src="./app.js" defer></script>
  </body>
</html>
